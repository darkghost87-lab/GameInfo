<body>
    <div id="pic">
        <div id="loginpanel">
            <br>
            <h4 class="title-login-page">برای ورود اقدام کنید</h4>
            <form class="loginform">
                <div id="pic2"></div>
                <input type="text" class="input-data" id="input-login" placeholder="نام کاربری را وارد کنید">
                <input type="password" class="input-data" id="input-login" placeholder="رمز عبور را وارد کنید">
                <button type="submit" id="login-btn" class="login-btn">ورود</button>
                <hr class="hr">
                <h4 class="h1">1.محتوای سایت مربوط به نصب و راهنمای بازی هایه کامپیوتری است.</h4>
                <h4 class="h1">2. از به اشتراک گذاری لینک هایه غیر مجاز و محتوای قفل شکن خودداری کنید.</h4>
                <h4 class="h1">3.پاسخ سوالات در اسرع وقت و به ترتیب پاسخ داده میشود.</h4>
                <hr class="hr">
            </form>
            <div class="signup-div-loginpage">
                <h4>اگر حساب کاربری ندارید برای ثبت نام اقدام نمایید.</h4>
                <a href="signup.html" class="back-to-main">ثبت نام</a>

        </div>
